name: NSE Scanner

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * 1-5'
    # 3:45 PM IST = 10:15 AM UTC  (post-market close)
    - cron: '15 10 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI
  push:
    branches: [master]
    paths: ['.github/workflows/scanner.yml']  # only runs when this file changes

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            yfinance>=0.2.40 \
            pandas>=2.0.0 \
            numpy>=1.26.0 \
            python-telegram-bot>=21.0 \
            python-dotenv>=1.0.0 \
            requests>=2.31.0

      - name: Run scanner and send Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python github_scan.py
